name: Keep Market Dashboard Alive

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:         # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Dashboard
        run: |
          echo "Pinging Market Dashboard at $(date)"
          curl --max-time 60 --retry 3 --retry-delay 10 \
            --max-redirs 10 \
            -A "Mozilla/5.0" \
            -L https://ifplmarketdashboard.streamlit.app/ || true
          echo "Ping complete"
