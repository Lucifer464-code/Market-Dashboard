name: Keep IFPLMD Alive

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Wake up Portivex with real browser
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print("Opening Portivex...")
              page.goto("https://ifplmarketdashboard.streamlit.app/", wait_until="networkidle", timeout=60000)
              page.wait_for_timeout(15000)  # Stay connected for 15 seconds
              print("Done — Streamlit session established")
              browser.close()
          EOF
